name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          check-latest: true
      # Pin golangci-lint to match the version used locally during the
      # ci-golangci-lint ticket triage. Bump deliberately so dev and CI
      # flag the same things.
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

  test:
    name: test (race)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          check-latest: true
      - run: make test/ci

  test-integration:
    name: test (integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          check-latest: true
      - run: make test/integration

  # End-to-end CDC pressure-test harness: spawns committed as a child
  # process, drives a real Postgres via testcontainers, and asserts the
  # exact proposal stream. ubuntu-latest has Docker preinstalled so
  # testcontainers-go works out of the box. The make target sets
  # -p=1 because parallel container startup chokes Docker.
  test-cdc:
    name: test (cdc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          check-latest: true
      - run: make test/cdc

  # Rolling-upgrade per-node test: builds the real binary and exercises the
  # graceful-stop → restart-over-same-data-dir → /ready → /version cycle plus
  # state survival (docs/operations/upgrade.md). No Docker, runs in seconds, so
  # it gates every push/PR like the unit suites — it guards the binary-level
  # shutdown/restart/readiness path the in-process tests can't reach.
  test-upgrade:
    name: test (upgrade)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          check-latest: true
      - run: make test/upgrade

  # Backup/restore round-trip: builds the binary and runs the real
  # backup → restore → boot-and-verify cycle. No Docker, runs in seconds,
  # so it gates every push/PR like the unit suites.
  test-backup:
    name: test (backup)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          check-latest: true
      - run: make test/backup

  # Adversarial raft suite gates against timing flakes with 20 runs under
  # -race. Sharded across a 4-way matrix (4 × count=5 = 20 total runs) to cut
  # wall-clock ~4× without weakening the gate — each shard still accumulates
  # across its 5 in-process iterations. fail-fast is off so one shard's flake
  # doesn't cancel the others (we want every shard's evidence). Limit to main
  # pushes and manual dispatch to keep PR feedback fast; rely on lint + test
  # for the PR gate.
  test-adversarial:
    name: test (adversarial ${{ matrix.shard }}/4)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          check-latest: true
      - run: make test/adversarial ADVERSARIAL_COUNT=5

  # Scan the runtime image for known-vulnerable OS packages and Go
  # modules. Trivy reads the GitHub Advisory DB + NVD — the same advisory
  # sources Docker Hub's Scout uses — so this catches CVEs that
  # govulncheck's Go-only vuln DB misses (e.g. pgx GHSA-j88v-2chj-qfwx /
  # CVE-2026-41889, which reached Docker Hub before we caught it).
  # Building the image first means we scan exactly what ships: the static
  # Go binary on distroless, the same two layers Scout sees.
  #
  # Gate: fail on any *fixable* vulnerability, all severities. This
  # mirrors Scout, which lists every fixable CVE regardless of rank —
  # note the pgx CVE that motivated this job is only rated LOW (CVSS 2.3)
  # by NVD/Trivy, so a HIGH/CRITICAL-only gate would have missed it.
  # ignore-unfixed keeps un-actionable findings (no upstream patch yet)
  # from blocking work, so every failure here is a dependency/base bump
  # away from green. To make it less strict, trim `severity` (e.g. to
  # CRITICAL,HIGH) or set exit-code "0" to report-only.
  vuln-scan:
    name: vulnerability scan (trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build runtime image
        run: make docker/build IMAGE=committed:scan
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          # Authenticated DB pulls from ghcr.io avoid anonymous
          # rate-limit flakes; GITHUB_TOKEN is provided automatically.
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        with:
          image-ref: committed:scan
          scanners: vuln
          vuln-type: os,library
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

  # Full gosec static-analysis security scan, including the SSA/taint analyzers
  # (G701-G707: SQL/command injection, path traversal, SSRF, XSS) that the
  # blocking golangci-lint job deliberately omits. gosec runs in ~2s over the
  # whole module EXCEPT internal/cluster/backup, whose tar-extraction taint
  # analysis takes ~6 hours; the `make lint/gosec` target leaves that one
  # package out of the list. timeout-minutes is the hang backstop. See the
  # lint/gosec target in the Makefile and .golangci.gosec.yml.
  gosec:
    name: gosec (security)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          check-latest: true
      # Install the golangci-lint binary (pinned to match the lint job and local
      # dev) so the batched script can invoke it per package.
      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.11.4
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - run: make lint/gosec
