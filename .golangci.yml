# Conservative starter set. Noisy linters (funlen, gocyclo, gocognit,
# varnamelen, wsl) are intentionally off until the team opts in.
version: "2"

run:
  timeout: 5m
  # Build tags compiled when linting. docker/integration pull in the
  # testcontainers -> docker -> moby tree, but that tree loads in well under a
  # second and is NOT a lint bottleneck, so every tag is linted for full
  # coverage. (The hour-long CI lint hang first seen here was gosec, not these
  # tags — gosec now runs in its own `gosec (security)` CI job, package by
  # package; see .golangci.gosec.yml.)
  build-tags:
    - adversarial
    - docker
    - integration
    - upgrade
    - backup

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - bodyclose
    - prealloc
    # NOTE: gosec is intentionally NOT in this blocking lint. It runs in the
    # `gosec (security)` CI job instead (scripts/gosec.sh + .golangci.gosec.yml),
    # which carries the heavier SSA/taint analyzers — including G115 and the
    # taint set G701-G707. gosec is fast (~2s) EXCEPT on internal/cluster/backup,
    # whose tar-extraction taint analysis takes ~6 hours; that one package is
    # excluded there. Keeping gosec out of this job leaves the blocking lint fast
    # and clear of that landmine. See .golangci.gosec.yml.

  settings:
    staticcheck:
      # Start from golangci-lint's default set (which omits the
      # opinionated ST* "stylecheck" family), then drop QF1008 —
      # a stylistic embedded-field refactor, not a correctness
      # issue, that fights with explicit `e.Type.X` paths that
      # are clearer in tests and required when a nil-check comes
      # first.
      checks:
        - all
        - -ST1000
        - -ST1003
        - -ST1016
        - -ST1020
        - -ST1021
        - -ST1022
        - -QF1008

  exclusions:
    generated: lax
    paths:
      - ".*\\.pb\\.go$"
      - "internal/cluster/clusterfakes/"
      - "internal/cluster/db/dbfakes/"
      - "internal/cluster/ingestable/sql/sqlfakes/"
      - "demo/"
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - bodyclose

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/committeddb/committed
