# Conservative starter set. Noisy linters (funlen, gocyclo, gocognit,
# varnamelen, wsl) are intentionally off until the team opts in.
version: "2"

run:
  timeout: 5m
  # Build tags listed here are compiled AND fed to the whole-program linters
  # (unused/staticcheck/gosec), which build reachability facts over the entire
  # transitive import graph. `docker` and `integration` gate the testcontainers
  # harness (e2e/cdc/**) and the SQL integration tests, which pull in the full
  # testcontainers -> docker -> moby tree (hundreds of packages). Analyzing that
  # third-party tree yields zero lint signal but makes a cold-cache run pass
  # over it super-linearly — a 50m+ hang on CI every time a build-tags or go.mod
  # change invalidates the cache. So they are deliberately EXCLUDED: those files
  # are still compiled, vetted, and executed by the `test (integration)` and
  # `test (cdc)` CI jobs, just not linted. Keep only lightweight, pure-Go tags
  # here. Do not re-add docker/integration without re-introducing the hang.
  build-tags:
    - adversarial
    - upgrade
    - backup

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - bodyclose
    - prealloc
    - gosec

  settings:
    gosec:
      excludes:
        # G104 (unhandled errors) overlaps with errcheck; avoid double
        # reports.
        - G104
    staticcheck:
      # Start from golangci-lint's default set (which omits the
      # opinionated ST* "stylecheck" family), then drop QF1008 —
      # a stylistic embedded-field refactor, not a correctness
      # issue, that fights with explicit `e.Type.X` paths that
      # are clearer in tests and required when a nil-check comes
      # first.
      checks:
        - all
        - -ST1000
        - -ST1003
        - -ST1016
        - -ST1020
        - -ST1021
        - -ST1022
        - -QF1008

  exclusions:
    generated: lax
    paths:
      - ".*\\.pb\\.go$"
      - "internal/cluster/clusterfakes/"
      - "internal/cluster/db/dbfakes/"
      - "internal/cluster/ingestable/sql/sqlfakes/"
      - "demo/"
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - bodyclose
          - gosec

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/committeddb/committed
