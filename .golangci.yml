# Conservative starter set. Noisy linters (funlen, gocyclo, gocognit,
# varnamelen, wsl) are intentionally off until the team opts in.
version: "2"

run:
  timeout: 5m
  # Build tags compiled when linting. docker/integration pull in the
  # testcontainers -> docker -> moby tree, but that tree loads in well under a
  # second and is NOT a lint bottleneck, so every tag is linted for full
  # coverage. (The hour-long CI lint hang first seen here was gosec, not these
  # tags — gosec now runs in its own `gosec (security)` CI job, package by
  # package; see .golangci.gosec.yml.)
  build-tags:
    - adversarial
    - docker
    - integration
    - upgrade
    - backup

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - bodyclose
    - prealloc
    # Scoped to the SQL subsystem only (see exclusions below): bans a bare
    # url.Parse on a connection string, which must go through sql.ParseConnString
    # so a parse error can't echo the ${VAR}-resolved password. This is the one
    # narrow place a lint guard earns its keep — the risk (secret leak) is high
    # and the correct call is non-obvious, so a copy-paste of url.Parse should
    # fail CI rather than silently reintroduce the leak.
    - forbidigo
    # NOTE: gosec is intentionally NOT in this blocking lint. It runs in the
    # `gosec (security)` CI job instead (scripts/gosec.sh + .golangci.gosec.yml),
    # which carries the heavier SSA/taint analyzers — including G115 and the
    # taint set G701-G707. gosec is fast (~2s) EXCEPT on internal/cluster/backup,
    # whose tar-extraction taint analysis takes ~6 hours; that one package is
    # excluded there. Keeping gosec out of this job leaves the blocking lint fast
    # and clear of that landmine. See .golangci.gosec.yml.

  settings:
    forbidigo:
      # Providing our own forbid list REPLACES forbidigo's default (which bans
      # fmt.Print*); we only want the url.Parse rule, scoped by the exclusions
      # below to the SQL subsystem.
      forbid:
        - pattern: '^url\.Parse$'
          msg: "parse connection strings with sql.ParseConnString, not url.Parse: url.Parse's error embeds the raw (secret-bearing) URL. See internal/cluster/ingestable/sql/connstring.go."
    staticcheck:
      # Start from golangci-lint's default set (which omits the
      # opinionated ST* "stylecheck" family), then drop QF1008 —
      # a stylistic embedded-field refactor, not a correctness
      # issue, that fights with explicit `e.Type.X` paths that
      # are clearer in tests and required when a nil-check comes
      # first.
      checks:
        - all
        - -ST1000
        - -ST1003
        - -ST1016
        - -ST1020
        - -ST1021
        - -ST1022
        - -QF1008

  exclusions:
    generated: lax
    paths:
      - ".*\\.pb\\.go$"
      - "internal/cluster/clusterfakes/"
      - "internal/cluster/db/dbfakes/"
      - "internal/cluster/ingestable/sql/sqlfakes/"
      - "demo/"
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - bodyclose
      # forbidigo's url.Parse ban applies ONLY in the SQL subsystem, where the
      # string being parsed is a ${VAR}-resolved connection string. path-except
      # suppresses forbidigo everywhere else, so legitimate url.Parse on webhook
      # endpoints / HTTP URLs is untouched.
      - linters:
          - forbidigo
        path-except: internal/cluster/(ingestable|syncable)/sql/
      # connstring.go IS the one sanctioned url.Parse call site (sql.ParseConnString).
      - linters:
          - forbidigo
        path: internal/cluster/ingestable/sql/connstring\.go

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/committeddb/committed
