openapi: 3.1.0
info:
  title: Committed API
  version: 0.7.3
  description: |
    HTTP API for Committed — a distributed commit log database.

    Committed exposes two primitives over HTTP:

    - **write**: append proposals to topics (POST /v1/proposal)
    - **configure**: manage databases, ingestables, syncables, and types

    The API is not a query interface, and `/v1/proposal` is write-only:
    there is no endpoint to read the log back. Reads are limited to
    configuration retrieval. For querying committed data, use a syncable to
    replicate it to an external database and query there.

    ## Versioning

    Every API endpoint is served under a `/v1` URL prefix. Additive
    changes (new endpoints, new optional fields) are made in place within
    a major version; a breaking change bumps the prefix to `/v2` and the
    old prefix is supported for at least one further release. Operational
    endpoints (`/health`, `/ready`, `/version`, `/openapi.yaml`, `/docs`)
    are infrastructure, not API surface, and stay unprefixed. See
    `docs/api-compatibility.md` for the full contract.

    ## Authentication

    When the server is started with `COMMITTED_API_TOKEN`, all API
    endpoints require a bearer token in the `Authorization` header. The
    operational endpoints `/health`, `/ready`, `/version`, `/openapi.yaml`,
    and `/docs` are exempt. In development mode (no token configured) no
    authentication is enforced.

    ## Content types

    Configuration bodies accept either `text/toml` (default) or
    `application/json`. The server stores and returns the original bytes
    unchanged; it is the client's responsibility to send a well-formed
    document matching the declared content type.

    ## Consistency

    All `POST` proposals go through Raft consensus and return only after
    the proposal has been committed.

    `GET` reads are **linearizable by default**: the serving node confirms
    it still holds Raft quorum (a ReadIndex heartbeat round-trip) and waits
    for its local apply to catch up before answering, so a read reflects
    every write that completed before it began — and a node partitioned
    from the leader returns `503` rather than stale data. Pass
    `?consistency=stale` on any GET to skip that confirmation and serve
    local state immediately, accepting that a lagging node may answer with
    out-of-date data. See `docs/consistency.md` for the full model.
servers:
  - url: /
    description: Served from the same origin as this spec
security:
  - bearerAuth: []
tags:
  - name: health
    description: Liveness and readiness probes
  - name: meta
    description: Spec and documentation endpoints
  - name: database
    description: Database connection configurations
  - name: ingestable
    description: Configurations for ingesting data from external sources
  - name: syncable
    description: Configurations for syncing data to external systems
  - name: type
    description: Schema and type definitions
  - name: proposal
    description: Append proposals to the commit log (write-only)
  - name: node
    description: Per-node diagnostics for the node that serves the request
  - name: membership
    description: Live raft cluster membership (add/remove nodes)
paths:
  /health:
    get:
      tags: [health]
      summary: Liveness probe
      description: |
        Always returns 200 if the HTTP server is accepting requests.
        Intentionally does not check raft or apply state — a follower
        that has lost quorum is still alive and restarting it will not
        help.
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Process is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /ready:
    get:
      tags: [health]
      summary: Readiness probe
      description: |
        Returns 200 once raft has elected a leader AND the node has
        applied at least one entry. Returns 503 otherwise. Orchestrators
        should keep traffic away until this endpoint reports ready.
      operationId: getReady
      security: []
      responses:
        '200':
          description: Node is ready to serve traffic
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
        '503':
          description: Node is not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
  /openapi.yaml:
    get:
      tags: [meta]
      summary: OpenAPI specification
      description: Returns this OpenAPI document as YAML.
      operationId: getOpenAPISpec
      security: []
      responses:
        '200':
          description: The OpenAPI spec
          content:
            application/yaml:
              schema:
                type: string
  /docs:
    get:
      tags: [meta]
      summary: Swagger UI
      description: Browsable HTML documentation for the API.
      operationId: getDocs
      security: []
      responses:
        '200':
          description: Swagger UI HTML page
          content:
            text/html:
              schema:
                type: string

  /version:
    get:
      tags: [meta]
      summary: Build identity of the running binary
      description: |
        Returns the build-time identity (version, commit, build date, Go
        toolchain) of the node that answered. Unauthenticated and state-free,
        like `/health` — operators use it to confirm every node is on the same
        build without needing a token or the leader.
      operationId: getVersion
      security: []
      responses:
        '200':
          description: Build identity of the answering node.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'

  /v1/database:
    get:
      tags: [database]
      summary: List all databases
      operationId: getDatabases
      parameters:
        - $ref: '#/components/parameters/Consistency'
      responses:
        '200':
          description: All database configurations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConfigurationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/NotLinearizable'
  /v1/database/{id}:
    post:
      tags: [database]
      summary: Create or update a database configuration
      operationId: addDatabase
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        description: Database configuration as TOML or JSON.
        content:
          text/toml:
            schema:
              type: string
          application/json:
            schema:
              type: string
      responses:
        '200':
          $ref: '#/components/responses/ConfigWritten'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
        '507':
          $ref: '#/components/responses/InsufficientStorage'
  /v1/database/{id}/versions:
    get:
      tags: [database]
      summary: List database configuration versions
      operationId: getDatabaseVersions
      parameters:
        - $ref: '#/components/parameters/Consistency'
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Version history (newest first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VersionInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/NotLinearizable'
  /v1/database/{id}/versions/{version}:
    get:
      tags: [database]
      summary: Get a specific database configuration version
      operationId: getDatabaseVersion
      parameters:
        - $ref: '#/components/parameters/Consistency'
        - $ref: '#/components/parameters/ResourceId'
        - $ref: '#/components/parameters/VersionNumber'
      responses:
        '200':
          description: The configuration at the requested version.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigurationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/NotLinearizable'
  /v1/database/{id}/rollback:
    post:
      tags: [database]
      summary: Roll a database back to a previous version
      description: |
        Reads the configuration at version `to` and re-proposes it as a
        new current version. The old versions remain in the history.
      operationId: rollbackDatabase
      parameters:
        - $ref: '#/components/parameters/ResourceId'
        - $ref: '#/components/parameters/RollbackTo'
      responses:
        '200':
          $ref: '#/components/responses/ConfigWritten'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/ingestable:
    get:
      tags: [ingestable]
      summary: List all ingestables
      operationId: getIngestables
      parameters:
        - $ref: '#/components/parameters/Consistency'
      responses:
        '200':
          description: All ingestable configurations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConfigurationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/NotLinearizable'
  /v1/ingestable/{id}:
    post:
      tags: [ingestable]
      summary: Create or update an ingestable configuration
      operationId: addIngestable
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        description: Ingestable configuration as TOML or JSON.
        content:
          text/toml:
            schema:
              type: string
          application/json:
            schema:
              type: string
      responses:
        '200':
          $ref: '#/components/responses/ConfigWritten'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
        '507':
          $ref: '#/components/responses/InsufficientStorage'
    delete:
      tags: [ingestable]
      summary: Delete an ingestable
      description: |
        Removes an ingestable: its configuration and its checkpoint position are
        deleted atomically (one committed Actual), the worker is stopped, and the
        owner drops the source-side replication resources (for a Postgres source,
        the replication slot and publication) on a best-effort basis. Dropping
        the slot is important on decommission: an orphaned slot holds the source's
        WAL and can fill the source's disk. The logical deletion is the
        authoritative act and completes before this returns; the source teardown
        settles shortly after on the leader and, if it fails, only orphans the
        slot (the delete still succeeds — drop it manually). After deletion a
        later same-id POST starts fresh from a full snapshot. Leader-pinned.
      operationId: deleteIngestable
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Ingestable deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/MembershipUnconfirmed'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/ingestable/{id}/versions:
    get:
      tags: [ingestable]
      summary: List ingestable configuration versions
      operationId: getIngestableVersions
      parameters:
        - $ref: '#/components/parameters/Consistency'
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Version history (newest first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VersionInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/NotLinearizable'
  /v1/ingestable/{id}/versions/{version}:
    get:
      tags: [ingestable]
      summary: Get a specific ingestable configuration version
      operationId: getIngestableVersion
      parameters:
        - $ref: '#/components/parameters/Consistency'
        - $ref: '#/components/parameters/ResourceId'
        - $ref: '#/components/parameters/VersionNumber'
      responses:
        '200':
          description: The configuration at the requested version.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigurationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/NotLinearizable'
  /v1/ingestable/{id}/status:
    get:
      tags: [ingestable]
      summary: Report an ingestable worker's snapshot/streaming progress and lag
      description: |
        Reports an ingestable worker's operational status: snapshot vs.
        streaming phase, per-table snapshot progress, the CDC position (a
        Postgres LSN), how many bytes it is behind the source, and whether it is
        caught up. The ingest analogue of `GET /v1/syncable/{id}/status`. Read
        behind a linearize barrier so the persisted position is consistent on
        whichever node answers; the lag is a live query against the source slot.
      operationId: getIngestableStatus
      parameters:
        - $ref: '#/components/parameters/Consistency'
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: The ingestable's current worker status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestableStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/NotLinearizable'

  /v1/type/{id}/pipeline:
    get:
      tags: [type]
      summary: End-to-end status of a topic's pipeline
      description: |
        Composes the end-to-end status of the pipeline flowing through topic
        `{id}` (the type id): its producing ingestable's status (if any), the
        data head, and every syncable consuming the topic, with an overall
        `caughtUp` flag. The linkage (producing ingestable → topic → consuming
        syncables) is resolved server-side from the stored configs — the caller
        passes only the topic. Because it is anchored on the topic rather than an
        ingestable, it also covers a topic fed by direct proposals (no
        ingestable). It reuses the same computations as
        `GET /v1/ingestable/{id}/status` and `GET /v1/syncable/{id}/status`, so
        the numbers match. Read behind a linearize barrier.
      operationId: getPipelineStatus
      parameters:
        - $ref: '#/components/parameters/Consistency'
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: The pipeline's composed status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/NotLinearizable'

  /v1/ingestable/{id}/rollback:
    post:
      tags: [ingestable]
      summary: Roll an ingestable back to a previous version
      operationId: rollbackIngestable
      parameters:
        - $ref: '#/components/parameters/ResourceId'
        - $ref: '#/components/parameters/RollbackTo'
      responses:
        '200':
          $ref: '#/components/responses/ConfigWritten'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/syncable:
    get:
      tags: [syncable]
      summary: List all syncables
      operationId: getSyncables
      parameters:
        - $ref: '#/components/parameters/Consistency'
      responses:
        '200':
          description: All syncable configurations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConfigurationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/NotLinearizable'
  /v1/syncable/{id}:
    post:
      tags: [syncable]
      summary: Create or update a syncable configuration
      description: |
        Proposes a syncable configuration. `syncable.type` selects the
        implementation: `sql` (one row per event — history tables and
        the whole-payload `"$"` event-log shape), `sql-projection`
        (a fold into one row per entity — current-state tables,
        optionally folding several source topics into one denormalized
        row via `[[sql-projection.source]]` blocks with a per-source
        `onDelete`; a source folds scalar columns via `rules`, one
        collection column via an `aggregate` block, or a dimension table
        via a `lookup` block (whose fields aggregate elements resolve by
        an `on`/`select` join — enrichment), and several sources may
        share a topic, split by a per-source `when`; see README § SQL
        projections), or `http` (webhook). For `sql-projection`, config
        misuse (a `set` entry without exactly one of `from`/`value`/`null`,
        a `when` entry without exactly one of `equals`/`null`, an unknown
        column, a rule setting the primary-key column, an invalid
        `onDelete`, two sources writing the same column, an aggregate
        without a valid column/elementKey/element, an enrichment
        referencing an unknown lookup) fails here with 400. A rule or
        source with no `when` matches every event of its topic.
      operationId: addSyncable
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        description: Syncable configuration as TOML or JSON.
        content:
          text/toml:
            schema:
              type: string
          application/json:
            schema:
              type: string
      responses:
        '200':
          $ref: '#/components/responses/ConfigWritten'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: |
            The re-POSTed config would change the materialized table schema of
            an existing table. The table is created with CREATE TABLE IF NOT
            EXISTS and never ALTERed, so this would silently no-op. Rebuild the
            table in place instead. The `code` is
            `schema_change_requires_rebuild` and `details` names the table and
            the added/removed/changed columns, so a deploy pipeline can branch
            to the rebuild verb without scraping the message.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'
        '507':
          $ref: '#/components/responses/InsufficientStorage'
    delete:
      tags: [syncable]
      summary: Delete a syncable
      description: |
        Removes a syncable: its configuration and its checkpoint index are
        deleted atomically (one committed Actual), the worker is stopped, and —
        unless `keepData=true` — the owner tears down the syncable's destination
        on a best-effort basis (for a SQL syncable, dropping its table). The
        logical deletion is the authoritative act and completes before this
        returns; the teardown settles shortly after on the leader and, if it
        fails, only orphans destination state (the delete still succeeds). After
        deletion a later same-id POST starts fresh from index 0. Leader-pinned.
      operationId: deleteSyncable
      parameters:
        - $ref: '#/components/parameters/ResourceId'
        - name: keepData
          in: query
          required: false
          description: |
            When true, the syncable's destination state is preserved (the
            logical delete still proceeds). Use when another consumer reads a
            SQL syncable's table, or the node has DML-only grants. Defaults to
            false (tear the destination down).
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Syncable deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  keepData:
                    type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/MembershipUnconfirmed'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/syncable/{id}/versions:
    get:
      tags: [syncable]
      summary: List syncable configuration versions
      operationId: getSyncableVersions
      parameters:
        - $ref: '#/components/parameters/Consistency'
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Version history (newest first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VersionInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/NotLinearizable'
  /v1/syncable/{id}/versions/{version}:
    get:
      tags: [syncable]
      summary: Get a specific syncable configuration version
      operationId: getSyncableVersion
      parameters:
        - $ref: '#/components/parameters/Consistency'
        - $ref: '#/components/parameters/ResourceId'
        - $ref: '#/components/parameters/VersionNumber'
      responses:
        '200':
          description: The configuration at the requested version.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigurationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/NotLinearizable'
  /v1/syncable/{id}/errors:
    get:
      tags: [syncable]
      summary: List proposals a syncable skipped (dead letters)
      description: |
        Returns the dead-letter records for a syncable — proposals it gave
        up on and skipped — in ascending raft-index order. The `kind` field
        says why: `permanent` (the sync failed with a non-retryable error)
        or `manual` (an operator skipped a syncable wedged on a transient
        error via the deadletter endpoint). The records are replicated
        state, so any node answers identically.

        Page forward by passing the `index` of the last record you saw as
        the next `since`.
      operationId: getSyncableErrors
      parameters:
        - $ref: '#/components/parameters/Consistency'
        - $ref: '#/components/parameters/ResourceId'
        - name: since
          in: query
          required: false
          description: |
            Exclusive raft-index cursor: only records with index strictly
            greater than this are returned. Default 0 (from the beginning).
          schema:
            type: integer
            format: int64
            minimum: 0
        - name: limit
          in: query
          required: false
          description: |
            Maximum number of records to return. Defaults to 100; the
            server caps the maximum.
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Dead-letter records (ascending raft-index order; empty if none)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SyncableDeadLetterResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/NotLinearizable'
  /v1/syncable/{id}/deadletter:
    post:
      tags: [syncable]
      summary: Skip the proposal a syncable is currently blocked on
      description: |
        Dead-letters the proposal the syncable is currently blocked
        retrying and lets its worker advance past it. A transient (non-
        permanent) sync error retries forever by design, so a syncable
        wedged on a proposal the downstream will never accept stalls
        visibly (its `errors` total stops advancing) rather than losing
        data. This is the operator's lever to give up on that one
        proposal: it records a `manual` dead letter (queryable via
        `GET /v1/syncable/{id}/errors`) and the worker moves on.

        Use it when the downstream is healthy but one proposal won't
        apply — not during an outage, where the syncable is correctly
        waiting and you should let it.

        Works from any node: the stuck state is replicated, so any node
        finds the blocked index and proposes the skip through Raft. A
        syncable that isn't currently blocked returns 409. Discover stuck
        syncables via `GET /v1/syncable/{id}/status` or the
        `committed_sync_stuck` metric.
      operationId: deadLetterStuckSyncable
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '202':
          description: |
            Accepted. The worker will dead-letter the named proposal on its
            next retry; poll `GET /v1/syncable/{id}/errors` to confirm.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncableDeadLetterStuckResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: The syncable is not currently blocked (healthy or unknown).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/syncable/{id}/status:
    get:
      tags: [syncable]
      summary: Report whether a syncable's worker is blocked
      description: |
        Reports whether the syncable's worker is currently blocked retrying
        a transient error (a wedged syncable stalls visibly rather than
        losing data). Backed by replicated state, so any node answers
        identically — this is how you discover a wedged syncable behind a
        load balancer, and the `index` to expect when you POST
        `.../deadletter`. The `committed_sync_stuck` gauge carries the same
        signal for Prometheus alarms.
      operationId: getSyncableStatus
      parameters:
        - $ref: '#/components/parameters/Consistency'
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: The syncable's current worker status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncableStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/NotLinearizable'
  /v1/syncable/{id}/replay/{index}:
    post:
      tags: [syncable]
      summary: Re-drive a dead-lettered proposal
      description: |
        Re-runs the syncable's `Sync` for the dead-lettered proposal at raft
        `index` and, on success, clears the dead-letter record. Use it after
        you've fixed the downstream that caused the original skip (a
        `permanent` failure that's now resolved, or a `manual` skip you want
        to undo). Sync is idempotent, so replaying a proposal that already
        applied is harmless.

        Node-agnostic: config, the proposal, and the dead-letter store are
        all replicated, so any node can serve it.
      operationId: replaySyncableDeadLetter
      parameters:
        - $ref: '#/components/parameters/ResourceId'
        - name: index
          in: path
          required: true
          description: Raft index of the dead-lettered proposal to re-drive.
          schema:
            type: integer
            format: int64
            minimum: 0
      responses:
        '200':
          description: Re-synced successfully; the dead-letter record was cleared.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: The raft index is not a dead letter for this syncable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: |
            The re-sync failed again (the downstream still rejected the
            proposal); the dead-letter record is left in place. The `details`
            field carries the failure cause.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/syncable/{id}/rollback:
    post:
      tags: [syncable]
      summary: Roll a syncable back to a previous version
      operationId: rollbackSyncable
      parameters:
        - $ref: '#/components/parameters/ResourceId'
        - $ref: '#/components/parameters/RollbackTo'
      responses:
        '200':
          $ref: '#/components/responses/ConfigWritten'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/syncable/{id}/rebuild:
    post:
      tags: [syncable]
      summary: Rebuild a syncable's table in place from index 0
      description: |
        Re-materializes the syncable's destination table from the log, keeping
        the same config (and schema). The checkpoint is reset, the table is
        dropped and recreated empty, and the worker replays from index 0 — the
        recovery primitive for a drifted or corrupted projection. Rows the
        replay does not reproduce are gone. Schema changes are NOT done this way
        (DELETE then re-POST with the new schema). Re-runnable and idempotent;
        leader-pinned. Returns 202 once the reset + drop/recreate are done; the
        replay that refills the table runs afterward (poll
        `GET /v1/syncable/{id}/status` for `lag` → 0).
      operationId: rebuildSyncable
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '202':
          description: Rebuild accepted; the table is recreated and the replay is underway.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          description: |
            Retryable. Either the underlying write could not be confirmed
            before the request deadline, or (`code: worker_wedged`) the
            syncable's local worker is wedged on its destination and did not
            stop within the drain bound — the rebuild aborted BEFORE the
            checkpoint reset, so nothing changed. Wait out (or fix) the
            destination and retry, or re-POST the config to replace the worker.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/type:
    get:
      tags: [type]
      summary: List all types
      operationId: getTypes
      parameters:
        - $ref: '#/components/parameters/Consistency'
      responses:
        '200':
          description: All type configurations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConfigurationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/NotLinearizable'
  /v1/type/{id}:
    # Write-only: a type's configuration is created/updated here and read
    # back via the version endpoints below or the GET /v1/type list. There
    # is no GET /v1/type/{id} — committed data is not queried over HTTP.
    post:
      tags: [type]
      summary: Create or update a type configuration
      description: |
        Proposes a type configuration. A schema change requires an explicit
        `[migration]` section: either `transform = "<jq>"` (a jq program
        upgrading previous-version data to the new shape) or `none = true`.
        The transform is compiled at propose time, so syntax errors fail
        here — but a program can still break at runtime on real payloads.
        To catch that early, optionally set
        `validate_against = '<sample JSON>'` in the `[migration]` section:
        the proposed transform is run against the sample (a document in the
        previous version's shape) and the request fails with 400 if it
        errors. `validate_against` is validation-only — it never becomes
        part of the type definition.

        A type may declare what the entities written under it are with
        `entityKind = "snapshot" | "event" | "command" | "standalone" | "revision"`
        (see README § Entity kinds). Omitting `entityKind`
        (unspecified, the default for every pre-existing type) changes
        nothing — no enforcement ever applies to it.
        `entityKind = "delta"` is rejected with 400: at-least-once sync
        delivery corrupts non-idempotent patches — model the changes as
        events instead. A declared entity kind is immutable: every
        later version must restate it, and changing it (or omitting it
        once declared) fails with 400 — a different kind means a new
        type. An `event`-kind type may additionally declare
        `discriminator = "$.event_type"`, the jsonpath of the field
        that distinguishes its event variants, for projection tooling
        to consume; `discriminator` on any other kind fails with 400.
        Declaring an entity kind on a previously-unspecified type
        (adoption) or changing the discriminator updates the current
        version in place — no version bump, no `[migration]` section
        needed.
      operationId: addType
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        description: Type configuration as TOML or JSON.
        content:
          text/toml:
            schema:
              type: string
          application/json:
            schema:
              type: string
      responses:
        '200':
          $ref: '#/components/responses/ConfigWritten'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
        '507':
          $ref: '#/components/responses/InsufficientStorage'
  /v1/type/{id}/versions:
    get:
      tags: [type]
      summary: List type configuration versions
      operationId: getTypeVersions
      parameters:
        - $ref: '#/components/parameters/Consistency'
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Version history (newest first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VersionInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/NotLinearizable'
  /v1/type/{id}/versions/{version}:
    get:
      tags: [type]
      summary: Get a specific type configuration version
      operationId: getTypeVersion
      parameters:
        - $ref: '#/components/parameters/Consistency'
        - $ref: '#/components/parameters/ResourceId'
        - $ref: '#/components/parameters/VersionNumber'
      responses:
        '200':
          description: The type configuration at the requested version.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigurationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/NotLinearizable'
  /v1/type/{id}/migration-errors:
    get:
      tags: [type]
      summary: List proposals that failed this type's migration at runtime
      description: |
        Returns the runtime migration failures recorded for a type —
        proposals whose entities its jq migration program could not
        transform — in ascending raft-index order. Each record names the
        failing chain step (`fromVersion` -> `toVersion`: the `toVersion`
        program is the one that errored). These are the type-keyed twins of
        the syncable dead letters: the same skipped proposal also appears
        in `GET /v1/syncable/{id}/errors` for the syncable that hit it.
        The records are replicated state, so any node answers identically.

        Page forward by passing the `index` of the last record you saw as
        the next `since`.
      operationId: getTypeMigrationErrors
      parameters:
        - $ref: '#/components/parameters/Consistency'
        - $ref: '#/components/parameters/ResourceId'
        - name: since
          in: query
          required: false
          description: |
            Exclusive raft-index cursor: only records with index strictly
            greater than this are returned. Default 0 (from the beginning).
          schema:
            type: integer
            format: int64
            minimum: 0
        - name: limit
          in: query
          required: false
          description: |
            Maximum number of records to return. Defaults to 100; the
            server caps the maximum.
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Migration failure records (ascending raft-index order; empty if none)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TypeMigrationErrorResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/NotLinearizable'
  /v1/type/{id}/migration-retry/{index}:
    post:
      tags: [type]
      summary: Re-run a failed migration after fixing the program
      description: |
        Re-runs the type's migration chain for the dead-lettered proposal
        at raft `index` and, on success, clears the migration-error record.
        Use it after fixing the program (re-`POST /v1/type/{id}` with a
        corrected `transform` — schema unchanged means the current
        version's migration is updated in place) to verify the fix against
        the exact payload that broke the old one.

        This validates the chain only — it does not deliver the result
        downstream. The proposal is still dead-lettered for every syncable
        that skipped it; replay those with
        `POST /v1/syncable/{id}/replay/{index}`, which re-runs the same
        (now-working) chain on the way through.

        Node-agnostic: the type history, the proposal, and the records are
        all replicated, so any node can serve it.
      operationId: replayTypeMigrationDeadLetter
      parameters:
        - $ref: '#/components/parameters/ResourceId'
        - name: index
          in: path
          required: true
          description: Raft index of the dead-lettered proposal to re-run.
          schema:
            type: integer
            format: int64
            minimum: 0
      responses:
        '200':
          description: The migration chain succeeded; the error record was cleared.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: The raft index is not a migration dead letter for this type.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: |
            The migration chain still fails on this proposal; the record is
            left in place. The `details` field carries the failure cause.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/proposal:
    # Write-only by design. Committed is a commit log, not a query
    # interface: there is no GET. To read committed data, replicate it to a
    # queryable store with a syncable and query there (see the API overview).
    post:
      tags: [proposal]
      summary: Append a proposal
      description: |
        Appends a new proposal containing one or more entities. The
        proposal's position in the log — its raft index, assigned by
        consensus — is its only ordering authority; the server records no
        wall-clock time for entities.

        If any referenced type has schema validation enabled and the
        entity data does not match, the whole proposal is rejected with
        400 `schema_validation_failed`.

        Returns 200 with an empty body on success.
      operationId: addProposal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddProposalRequest'
      responses:
        '200':
          description: Proposal accepted and committed
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
        '507':
          $ref: '#/components/responses/InsufficientStorage'

  /v1/scrub:
    post:
      tags: [proposal]
      summary: Erase delete-proposed entities (right-to-be-forgotten)
      description: |
        The manual right-to-be-forgotten lever: physically removes entities
        already marked deleted (via a `delete` proposal) from the permanent
        event log, up to the current applied index. The automatic scrubber does
        the same on a cadence; this triggers it on demand. Authenticated like
        every other write, and idempotent. Returns 202 once the scrub is
        submitted and confirmed by consensus.

        See docs/event-log-architecture.md for what the scrub removes (and the
        delete tombstone it deliberately retains).
      operationId: scrub
      responses:
        '202':
          description: Scrub submitted and confirmed by consensus.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/ScrubUnconfirmed'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/node/status:
    get:
      tags: [node]
      summary: Per-node diagnostics for the node that served the request
      description: |
        Returns diagnostics that are local and ephemeral to the node that
        answers — not part of the replicated config content — starting with
        the configs this node persisted but could not build into live
        objects (degraded, usually a missing `${VAR}` secret on this node).

        This is the queryable, authenticated counterpart of the
        `committed_config_build_errors` gauge: the gauge says how many
        configs are degraded so it can alert per node, while this says which
        ones and why. Each `error` names the failing `${VAR}` and never an
        interpolated value (interpolation failed, so no secret value exists
        to leak).

        `node` is load-bearing even though the path scopes to "this node":
        behind a load balancer you need to know which node answered. The
        path is the scope; the body is the identity. `leader` and
        `appliedIndex` mirror the raft details the unauthenticated `/ready`
        probe deliberately omits. A healthy node returns an empty
        `degradedConfigs` array.
      operationId: getNodeStatus
      responses:
        '200':
          description: This node's diagnostics.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/cluster/status:
    get:
      tags: [node]
      summary: Cluster-wide diagnostics that read the same from any node
      description: |
        Returns cluster-wide state backed by replicated data, so every node
        answers identically — which makes this endpoint safe behind a load
        balancer, unlike GET /node/status (whose fields are node-local).

        Today it carries `parkedWorkers`: the syncable and ingestable workers
        that have TERMINALLY parked (a sync circuit-breaker trip or an ingest
        supervisor give-up) and need operator intervention — the one call that
        answers "is anything parked anywhere?" A healthy cluster returns an empty
        array. Drill into the per-resource GET /{syncable,ingestable}/{id}/status
        for detail.
      operationId: getClusterStatus
      responses:
        '200':
          description: The cluster-wide diagnostics.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/node/disk-report:
    post:
      tags: [node]
      summary: Report a member's disk state to the leader (node-to-node)
      description: |
        The transport for cluster-aware disk admission. Each member
        periodically POSTs its node-local disk-pressure level to the
        leader's announced API URL, and the response carries back the
        cluster-wide write-admission verdict the leader computed from all
        voter states — admit iff the leader and a quorum of voters have
        disk headroom. The member caches the verdict and enforces it at its
        own propose gate, so one round trip per member per interval keeps
        both directions fresh.

        Nodes call this on each other; operators normally never do (though
        it is harmless to — a report only updates the sender's own entry).
        Authenticated with the same bearer token as every other write,
        which is why `COMMITTED_API_TOKEN` must be cluster-uniform. Only
        the leader aggregates reports: any other node answers 503
        `leader_unavailable` with the believed `leaderId`, and the
        reporter re-resolves the leader on its next cycle. See
        docs/operations/disk-limits.md.
      operationId: reportDisk
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiskReportRequest'
      responses:
        '200':
          description: Report recorded; the current cluster write-admission verdict.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiskReportResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: |
            This node is not the raft leader (reports are aggregated only
            there). The error details carry the believed `leaderId`; the
            reporter re-resolves the leader's announced API URL and retries
            on its next cycle.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/membership:
    get:
      tags: [membership]
      summary: List cluster members with roles and replication progress
      description: |
        Returns the raft cluster configuration — each member's role
        (`voter` / `learner`) and, for catch-up decisions, the leader-observed
        matched index — plus the answering snapshot's leader, term, commit, and
        applied indices.

        Per-member `matchIndex` is leader-only state in raft, so this read is
        answered by the leader: a request that lands on a follower is
        transparently proxied to the leader, giving a caller behind a load
        balancer a leader-truthful answer from any node. If the leader has not
        announced an API address (`COMMITTED_API_URL` unset) or no leader is
        known, the follower returns 503 with the believed `leaderId` in the
        error details so the caller can target the leader directly.

        A caller decides a member is "caught up" by comparing its `matchIndex`
        against `commitIndex` with its own threshold; the server does not
        judge readiness. See docs/operations/membership.md.
      operationId: getMembership
      responses:
        '200':
          description: The current membership and replication progress.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembershipResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: |
            No leader is known, or the leader's API address is unknown, so a
            leader-truthful answer can't be produced here. The error details
            carry `leaderId`. Retry, or target the leader directly.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [membership]
      summary: 'Add a node to the cluster (voter, or learner with "learner": true)'
      description: |
        Adds a node to the raft cluster via a joint-consensus (ConfChangeV2)
        membership change — a voter by default, or a non-voting learner when
        the body sets `"learner": true`. A learner replicates the log but does
        not count toward quorum; promote it to a voter with
        POST /v1/membership/{id}/promote once it has caught up. The change is
        partition-safe — it transits the joint configuration C_old ∪ C_new,
        which requires a majority of both the old and new configurations
        throughout, so it can never lose a committed entry. May be sent to any
        node; a follower forwards the proposal to the leader.

        The node named here must already be running in join mode
        (`COMMITTED_JOIN=true`) with a peer set that lets it reach the
        existing members. The call blocks until the change has taken effect,
        then returns 204. See docs/operations/membership.md.
      operationId: addMember
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddMemberRequest'
      responses:
        '204':
          description: Member added; the cluster has applied the new configuration.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/MembershipUnconfirmed'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/membership/{id}:
    delete:
      tags: [membership]
      summary: Remove a node from the cluster
      description: |
        Removes node `{id}` from the raft cluster via a joint-consensus
        (ConfChangeV2) membership change, with the same partition-safety and
        node-agnostic semantics as the add. The call blocks until the change
        has taken effect, then returns 204. The removed node steps out of the
        configuration and should be stopped afterward.
      operationId: removeMember
      parameters:
        - name: id
          in: path
          required: true
          description: Raft node id of the member to remove.
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        '204':
          description: Member removed; the cluster has applied the new configuration.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/MembershipUnconfirmed'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/membership/{id}/promote:
    post:
      tags: [membership]
      summary: Promote a learner to a voter
      description: |
        Promotes the existing learner `{id}` to a voter via a joint-consensus
        (ConfChangeV2) membership change. The call blocks until the change has
        taken effect, then returns 204. Same partition-safety and node-agnostic
        semantics as the other membership changes.

        This endpoint does NOT judge whether the learner has caught up — the
        caller decides "caught up" from the per-member replication progress in
        GET /v1/membership and promotes when ready. Promoting a non-learner or
        an unknown id returns 400.
      operationId: promoteMember
      parameters:
        - name: id
          in: path
          required: true
          description: Raft node id of the learner to promote.
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        '204':
          description: Learner promoted; the cluster has applied the new configuration.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/MembershipUnconfirmed'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        Static bearer token configured via `COMMITTED_API_TOKEN`. If the
        server was started without a token, authentication is disabled
        and any `Authorization` header is ignored.

  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      description: Resource identifier.
      schema:
        type: string
        minLength: 1
    VersionNumber:
      name: version
      in: path
      required: true
      description: Configuration version number (1-indexed, monotonic).
      schema:
        type: integer
        format: int64
        minimum: 1
    RollbackTo:
      name: to
      in: query
      required: true
      description: Version to roll back to.
      schema:
        type: integer
        format: int64
        minimum: 1
    Consistency:
      name: consistency
      in: query
      required: false
      description: |
        Read consistency. `linearizable` (the default) confirms the
        serving node still holds raft quorum via a ReadIndex round-trip and
        waits for local apply to catch up before answering, so the read
        reflects every write that completed before it — at the cost of one
        heartbeat round-trip. `stale` skips that confirmation and serves
        local state immediately; a node partitioned from the leader may
        then return out-of-date data. See docs/consistency.md.
      schema:
        type: string
        enum: [linearizable, stale]
        default: linearizable

  responses:
    ConfigWritten:
      description: |
        The config was committed. `version` is the server-assigned version the
        config now has — a rollback creates a NEW version; a byte-identical
        re-POST retains the existing one.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ConfigWriteResponse'
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadRequest:
      description: Malformed request or invalid configuration
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource or version not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InsufficientStorage:
      description: |
        The cluster (or this node) is low on disk space and is rejecting
        writes. Admission is decided cluster-wide — a write is admitted iff
        the leader and a quorum of voters have disk headroom — and enforced
        at whichever node receives it: user-data proposals are rejected once
        the cluster-effective free space falls to the critical threshold,
        config writes also freeze at the full threshold (sync/ingest
        checkpoints keep flowing). Writes re-enable automatically when free
        space recovers. The error `code` is `insufficient_storage`; diagnose
        with GET /v1/node/status (`disk.admission`). See
        docs/operations/disk-limits.md.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotLinearizable:
      description: |
        The node could not confirm a linearizable read (no raft quorum, or
        this node is partitioned from the leader). Retry, or request
        `?consistency=stale` to accept a possibly-stale read.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    MembershipUnconfirmed:
      description: |
        The membership change was submitted to raft but could not be
        confirmed to have taken effect before the request deadline —
        typically this node cannot currently reach a quorum. The change may
        still take effect once a quorum is reachable; re-query membership or
        retry the request (it is idempotent).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ScrubUnconfirmed:
      description: |
        The scrub was submitted to raft but could not be confirmed to have taken
        effect before the request deadline (`code` is `scrub_unconfirmed`) —
        typically this node cannot currently reach a quorum. It may still take
        effect once a quorum is reachable; the request is idempotent, so retry.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          const: ok

    ReadyResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, "not ready"]

    VersionResponse:
      type: object
      required: [version, commit, buildDate, goVersion]
      description: Build-time identity of the running binary.
      properties:
        version:
          type: string
          description: Release version (e.g. "0.7.3-beta"), or "dev" for an unstamped build.
        commit:
          type: string
          description: Git commit the binary was built from, or "unknown".
        buildDate:
          type: string
          description: Build timestamp, or "unknown".
        goVersion:
          type: string
          description: Go toolchain version the binary was built with.

    NodeStatusResponse:
      type: object
      required: [node, leader, appliedIndex, degradedConfigs, disk]
      description: |
        Per-node diagnostics for the node that served the request. The
        fields are node-local and ephemeral (not replicated), so two nodes
        can legitimately return different bodies for the same cluster state.
        Behind a load balancer you can't target a node — use GET /cluster/status
        for the cluster-wide view.
      properties:
        node:
          type: integer
          format: int64
          minimum: 0
          description: |
            Raft node ID of the node that answered. Load-bearing behind a
            load balancer — it tells you which node these diagnostics
            describe.
        leader:
          type: integer
          format: int64
          minimum: 0
          description: Node ID this node believes is the raft leader, or 0 if none is known.
        appliedIndex:
          type: integer
          format: int64
          minimum: 0
          description: Highest raft log index this node has fully applied.
        degradedConfigs:
          type: array
          description: |
            Configs this node persisted but could not build into a live
            object (usually a missing `${VAR}` secret on this node). Empty
            on a healthy node.
          items:
            $ref: '#/components/schemas/DegradedConfig'
        disk:
          $ref: '#/components/schemas/DiskStatus'

    ClusterStatusResponse:
      type: object
      required: [parkedWorkers]
      description: |
        Cluster-wide diagnostics that read the same from any node (backed by
        replicated state), so — unlike NodeStatusResponse — this endpoint is safe
        behind a load balancer.
      properties:
        parkedWorkers:
          type: array
          description: |
            Workers (sync or ingest) that have TERMINALLY parked and need operator
            intervention. Empty on a healthy cluster.
          items:
            $ref: '#/components/schemas/ParkedWorker'

    ParkedWorker:
      type: object
      required: [kind, id]
      description: One terminally-parked worker named in the /node/status summary.
      properties:
        kind:
          type: string
          enum: [sync, ingest]
          description: Which worker subsystem parked.
        id:
          type: string
          description: The syncable or ingestable id — drill into its per-resource status for detail.

    DiskStatus:
      type: object
      required: [state, admission]
      description: |
        This node's disk pressure and the write-admission decision its
        propose gate is applying. This is the queryable "writable" signal —
        deliberately separate from `/ready`, which feeds load balancers and
        would also drain the reads a low-disk node can still serve.
      properties:
        state:
          type: string
          enum: [ok, warn, critical, full]
          description: |
            Node-local disk-pressure level of this node's data directory, as
            last sampled by its disk-usage watcher.
        admission:
          $ref: '#/components/schemas/DiskAdmission'

    DiskAdmission:
      type: object
      required: [admitted, state, source]
      description: |
        One node's current write-admission view: whether user-data writes
        are accepted at this node right now, and why. With cluster-aware
        admission active (`source: cluster`) this is the leader-computed
        verdict — admit iff the leader and a quorum of voters have disk
        headroom — enforced identically at every node; under `source: local`
        the node has no fresh verdict (no leader known, leader has no
        announced API URL, or reports are failing) and falls back to gating
        on its own disk alone.
      properties:
        admitted:
          type: boolean
          description: Whether user-data proposals are accepted at this node right now.
        state:
          type: string
          enum: [ok, warn, critical, full]
          description: |
            Disk-pressure level driving the decision — cluster-effective
            under `source: cluster`, node-local under `source: local`.
            `critical` rejects user data with 507; `full` also freezes
            config; checkpoints always flow.
        reason:
          type: string
          description: |
            Operator-facing cause when degraded, e.g. `leader disk critical`
            or `quorum at risk: 1 of 3 voters have disk headroom (need 2)`.
            Omitted when healthy.
        source:
          type: string
          enum: [cluster, local]
          description: |
            `cluster` when a fresh leader-computed verdict is in force,
            `local` when the gate has fallen back to the node-local
            decision.
        leader:
          type: integer
          format: int64
          minimum: 0
          description: |
            Raft ID of the leader that computed the verdict. Omitted under
            `source: local`.

    DiskReportRequest:
      type: object
      required: [node, state]
      description: |
        One member's node-local disk-pressure report, pushed to the leader
        on the disk coordinator's cadence (`COMMITTED_DISK_REPORT_INTERVAL`).
      properties:
        node:
          type: integer
          format: int64
          minimum: 1
          description: Raft node ID of the reporting member.
        state:
          type: string
          enum: [ok, warn, critical, full]
          description: The member's disk-pressure level, as sampled by its disk-usage watcher.

    DiskReportResponse:
      type: object
      required: [state, reason, leader]
      description: |
        The cluster write-admission verdict, piggybacked on the report round
        trip. The reporting member caches it and enforces it at its own
        propose gate until the next round trip refreshes it.
      properties:
        state:
          type: string
          enum: [ok, warn, critical, full]
          description: |
            Cluster-effective disk-pressure level — the max of the leader's
            own level and the level a quorum of voters can collectively stay
            under. `critical` rejects user data cluster-wide; `full` also
            freezes config; checkpoints always flow.
        reason:
          type: string
          description: Operator-facing cause when degraded; empty when healthy.
        leader:
          type: integer
          format: int64
          minimum: 0
          description: Raft ID of the leader that computed the verdict.

    DegradedConfig:
      type: object
      required: [kind, id, error]
      description: |
        One config this node persisted but could not build locally. The
        raw config bytes are valid and replicated cluster-wide; only this
        node's live-object construction failed (a node-local condition).
      properties:
        kind:
          type: string
          enum: [database, ingestable, syncable]
          description: Config kind.
        id:
          type: string
          description: Config ID.
        error:
          type: string
          description: |
            Why the build failed. Names the failing `${VAR}` when a secret
            is unset; never contains an interpolated secret value
            (interpolation failed, so no value exists).

    ConfigWriteResponse:
      type: object
      required: [id]
      properties:
        id:
          type: string
          description: The config id the write addressed.
        version:
          type: integer
          format: int64
          minimum: 1
          description: |
            The server-assigned version the config now has. Omitted only if the
            post-write version read failed (the write itself succeeded).

    ConfigurationResponse:
      type: object
      required: [id, name, mimeType, data]
      description: |
        A versioned configuration document. `data` contains the raw bytes
        of the configuration as originally submitted, in the format
        indicated by `mimeType` (typically `text/toml` or
        `application/json`). `name` is currently always empty; it is
        reserved for a future human-readable label.
      properties:
        id:
          type: string
        name:
          type: string
          description: Human-readable label. Currently always empty; reserved.
        mimeType:
          type: string
          examples: ["text/toml", "application/json"]
        data:
          type: string
          description: Raw configuration bytes.

    VersionInfo:
      type: object
      required: [version, current]
      properties:
        version:
          type: integer
          format: int64
          minimum: 1
        current:
          type: boolean
          description: True if this is the current version.

    SyncableDeadLetterResponse:
      type: object
      required: [index, timestamp, kind, message]
      description: One proposal a syncable gave up on and skipped.
      properties:
        index:
          type: integer
          format: int64
          minimum: 0
          description: |
            Raft index of the dropped proposal. The proposal itself stays
            in the log; this is the pointer back to it. Pass it as `since`
            to page forward.
        timestamp:
          type: string
          format: date-time
          description: When the leader recorded the skip (RFC 3339, UTC).
        kind:
          type: string
          enum: [permanent, manual]
          description: |
            Why the proposal was skipped: `permanent` (non-retryable Sync
            error) or `manual` (an operator skipped a syncable wedged on a
            transient error).
        message:
          type: string
          description: Truncated error string from the failing Sync.

    TypeMigrationErrorResponse:
      type: object
      required: [index, fromVersion, toVersion, timestamp, message]
      description: |
        One runtime migration failure — a proposal whose entity the type's
        migration program could not transform.
      properties:
        index:
          type: integer
          format: int64
          minimum: 0
          description: |
            Raft index of the proposal whose entity failed to migrate. The
            data itself stays in the log; this is the pointer back to it.
            Pass it as `since` to page forward, or to
            `.../migration-retry/{index}` after fixing the program.
        fromVersion:
          type: integer
          description: |
            Stamped version the failing chain step started from; the
            `toVersion` program is the one that errored.
        toVersion:
          type: integer
          description: Version whose migration program failed.
        timestamp:
          type: string
          format: date-time
          description: When the leader recorded the failure (RFC 3339, UTC).
        message:
          type: string
          description: Truncated error string from the failing program.

    SyncableDeadLetterStuckResponse:
      type: object
      required: [index]
      description: The proposal a manual dead-letter request targeted.
      properties:
        index:
          type: integer
          format: int64
          minimum: 0
          description: |
            Raft index of the proposal the syncable was blocked on and that
            the worker will dead-letter. Query `GET /v1/syncable/{id}/errors`
            to confirm the `manual` record once it lands.

    SyncableStatusResponse:
      type: object
      required: [stuck, workerState, checkpointIndex, headIndex, lag, caughtUp]
      description: A syncable worker's current operational status and progress.
      properties:
        stuck:
          type: boolean
          description: |
            True if the worker has been blocked retrying a TRANSIENT error past
            the stuck threshold (it is still running). False for a healthy worker
            and for a terminal park (see `workerState`). The `index`, `since`, and
            `message` fields are present when stuck or parked.
        workerState:
          type: string
          enum: [running, parked]
          description: |
            The worker's lifecycle state: `running` (healthy, or transiently stuck
            retrying — see `stuck`) or `parked` (the circuit breaker tripped on a
            systematic config fault and the worker STOPPED — fix the config and
            re-POST it, or delete the syncable). Replicated, so any node reports it.
        index:
          type: integer
          format: int64
          minimum: 0
          description: Raft index the worker is blocked on (pass to .../deadletter). Present when stuck or parked.
        since:
          type: string
          format: date-time
          description: When the worker first wedged on this proposal (RFC 3339, UTC). Present when stuck or parked.
        message:
          type: string
          description: Truncated last transient error. Present when stuck or parked.
        checkpointIndex:
          type: integer
          format: int64
          minimum: 0
          description: |
            Persisted SyncableIndex — the consumed head this worker has synced,
            topic-skipped, or dead-lettered through. 0 if it has never
            checkpointed. Always present.
        headIndex:
          type: integer
          format: int64
          minimum: 0
          description: |
            Highest user-topic-data raft index applied on this node — the head
            the worker converges to when caught up. Excludes committed's
            internal entries (its configs and all coordination: index bumps,
            dead-letters, ingest positions, etc.) the syncable reader skips, so
            it is NOT the cluster commit index. Always present.
        lag:
          type: integer
          format: int64
          minimum: 0
          description: |
            max(0, headIndex - checkpointIndex) — how many data entries this
            syncable still has to process. 0 exactly when caught up. A
            selective syncable may transiently report a small positive lag under
            sustained cross-topic load (it reads and cheaply skips other topics
            to advance its consumed head) and returns to 0 at rest. Always present.
        caughtUp:
          type: boolean
          description: True iff lag == 0 — the syncable has nothing left to process. Always present.

    IngestableStatusResponse:
      type: object
      required: [workerState, snapshotProgress, position, lag, caughtUp, reSnapshotRequired]
      description: An ingestable worker's current operational status and progress.
      properties:
        workerState:
          type: string
          enum: [running, recovering, parked]
          description: |
            The worker's lifecycle state: `running`; `recovering` (frozen on a
            proposal it can't yet commit — the supervisor is restarting it; the
            phase/position below still show where it wedged); or `parked` (the
            supervisor gave up after repeated freezes at the same resume position —
            most often a row or transaction over the proposal-size cap; raise the cap
            and re-POST the config, or delete the ingestable). `parked` is replicated
            and reported truthfully from ANY node; `running`/`recovering` are read
            from the local worker, so a node not running it answers 404.
        phase:
          type: string
          enum: [snapshot, streaming]
          description: |
            `snapshot` while the worker is still dumping existing rows, then
            `streaming` once it is following the change-data-capture stream.
        snapshotProgress:
          type: array
          description: |
            Per watched table. Present in both phases — once the snapshot
            finishes every table reads `complete: true`.
          items:
            $ref: '#/components/schemas/TableSnapshotProgress'
        position:
          type: string
          description: |
            The dialect's CDC cursor in native text form: a Postgres LSN
            (`0/1A2B3C8`) or a MySQL binlog coordinate (`binlog.000004:1547`).
            Empty before the worker has checkpointed. For Postgres this is also
            the effectively-once resume + dedup point.
        lag:
          type: [integer, "null"]
          format: int64
          minimum: 0
          description: |
            How far the source's write head is ahead of what this ingest has
            durably consumed, in the dialect's natural unit: Postgres bytes
            (pg_current_wal_lsn − the slot's confirmed_flush_lsn); MySQL under
            GTID positioning transactions (count of @@gtid_executed − the
            consumed GTID set). `null` when it cannot be determined — during the
            snapshot phase, when the source is unreachable, on a MySQL source
            without GTID positioning (gtid_mode=OFF / a legacy file:pos
            checkpoint), or when a re-snapshot is required. A non-null 0 means
            fully caught up.
        caughtUp:
          type: boolean
          description: |
            True exactly when the snapshot is complete and lag is a known 0 —
            the only state in which the read model is fully current. Never true
            while lag is null.
        reSnapshotRequired:
          type: boolean
          description: |
            True when the source has discarded change data this ingest never
            consumed and can never re-stream — a MySQL source that purged binlogs
            past the consumed GTID set (@@gtid_purged ⊄ consumed). A distinct,
            loud state rather than a misleading lag number; recovery means
            re-running the initial snapshot. Always false for Postgres (the slot
            holds the WAL, so the source cannot purge unconsumed change data).

    TableSnapshotProgress:
      type: object
      required: [table, complete]
      description: One watched table's place in the initial snapshot.
      properties:
        table:
          type: string
          description: The source table name, as configured.
        lastKey:
          type: string
          description: |
            The keyset-pagination cursor reached for this table (the last
            primary-key value dumped). Omitted once the table is complete or
            before its snapshot starts.
        complete:
          type: boolean
          description: Whether this table's snapshot finished.

    PipelineStatusResponse:
      type: object
      required: [topic, headIndex, syncables, caughtUp]
      description: |
        The end-to-end status of one topic's pipeline: its producing ingestable
        (if any), the data head, and every syncable consuming the topic. Anchored
        on the topic (type id), so it also covers a topic fed by direct proposals.
      properties:
        topic:
          type: string
          description: The topic (type id) this pipeline flows through — the path key.
        headIndex:
          type: integer
          format: int64
          minimum: 0
          description: |
            The data head (the highest data-entry raft index applied locally) —
            the convergence target the producer and the consumers race toward.
        ingestable:
          type: string
          description: |
            The id of the ingestable producing this topic. Omitted when the topic
            is fed by direct proposals (no ingestable).
        ingest:
          allOf:
            - $ref: '#/components/schemas/IngestableStatusResponse'
          description: |
            The producer's ingest status. Present only when an ingestable
            produces this topic and its status was retrievable.
        ingestError:
          type: string
          description: |
            Set when a producing ingestable exists but its status could not be
            read — e.g. no ingestable worker is running on the node that answered.
            The producer is still named (`ingestable`) and the overall `caughtUp`
            is forced false. Omitted when the producer's status read cleanly or
            there is no producer.
        syncables:
          type: array
          description: Every syncable consuming the topic, with its lag.
          items:
            $ref: '#/components/schemas/PipelineSyncableStatus'
        caughtUp:
          type: boolean
          description: |
            True only when the producer (if any) is caught up AND every consuming
            syncable is caught up — the whole pipeline is at rest.

    PipelineSyncableStatus:
      type: object
      required: [id, workerState, stuck, checkpointIndex, lag, caughtUp]
      description: One consumer's place in the pipeline.
      properties:
        id:
          type: string
          description: The syncable id.
        workerState:
          type: string
          enum: [running, parked]
          description: >-
            The consumer worker's lifecycle state — `running` or `parked` (breaker
            tripped; operator must act). Mirrors GET /syncable/{id}/status so the
            pipeline view is not less informative.
        stuck:
          type: boolean
          description: True if this consumer is transiently stuck retrying (still running).
        checkpointIndex:
          type: integer
          format: int64
          minimum: 0
          description: The consumed head this syncable has durably checkpointed through.
        lag:
          type: integer
          format: int64
          minimum: 0
          description: max(0, headIndex − checkpointIndex). 0 when caught up.
        caughtUp:
          type: boolean
          description: True when this syncable's lag is 0.
        error:
          type: string
          description: >-
            Set when this consumer's progress could not be read. The consumer is
            still listed (rather than silently dropped) and the pipeline's
            overall caughtUp is forced false. Omitted when progress read cleanly.

    AddMemberRequest:
      type: object
      required: [id, url]
      properties:
        id:
          type: integer
          format: int64
          minimum: 1
          description: Raft node id of the member to add (unique, non-zero).
        url:
          type: string
          description: |
            Advertised raft peer URL of the new node — the address existing
            members will dial. Raft replicates only node ids, not addresses,
            so the url must be supplied here.
          examples: ["http://n4:9022"]
        learner:
          type: boolean
          default: false
          description: |
            Add the node as a non-voting learner (it replicates the log but
            does not count toward quorum) instead of a voter. Promote it later
            with POST /v1/membership/{id}/promote. Defaults to false (voter),
            so existing callers are unchanged.

    MembershipResponse:
      type: object
      required: [nodeId, leaderId, term, commitIndex, appliedIndex, isLeader, members]
      properties:
        nodeId:
          type: integer
          format: int64
          description: Raft node id that produced this snapshot.
        leaderId:
          type: integer
          format: int64
          description: Raft leader this node believes in (0 if none known).
        term:
          type: integer
          format: int64
          description: Current raft term.
        commitIndex:
          type: integer
          format: int64
          description: |
            Highest committed raft index — the catch-up target a caller
            compares a member's matchIndex against.
        appliedIndex:
          type: integer
          format: int64
          description: How far this node has applied committed entries.
        isLeader:
          type: boolean
          description: Whether this node is the leader (and thus whether member matchIndex values are populated).
        members:
          type: array
          items:
            $ref: '#/components/schemas/Member'
      example:
        nodeId: 1
        leaderId: 1
        term: 5
        commitIndex: 1234
        appliedIndex: 1234
        isLeader: true
        members:
          - { id: 1, role: voter, matchIndex: 1234, apiUrl: "http://n1:8080" }
          - { id: 4, role: learner, matchIndex: 1200, apiUrl: "http://n4:8080" }

    Member:
      type: object
      required: [id, role]
      properties:
        id:
          type: integer
          format: int64
          description: Raft node id.
        role:
          type: string
          enum: [voter, learner]
          description: |
            voter — counts toward quorum; learner — replicates the log but does
            not vote. (Learners are added by a later change; today every member
            is a voter.)
        matchIndex:
          type: integer
          format: int64
          description: |
            Highest log index the leader has confirmed this member replicated.
            Present only on a leader-produced snapshot (the read is proxied to
            the leader, so it is normally populated).
        apiUrl:
          type: string
          description: |
            Member's advertised HTTP API base URL, as self-announced. Omitted
            when the member has not announced one (no COMMITTED_API_URL).

    AddProposalRequest:
      type: object
      required: [entities]
      properties:
        entities:
          type: array
          items:
            $ref: '#/components/schemas/AddEntityRequest'

    AddEntityRequest:
      type: object
      required: [typeId, key]
      properties:
        typeId:
          type: string
          description: Type ID this entity belongs to.
        key:
          type: string
          description: Entity key (unique within a type).
        data:
          description: |
            Entity data as an arbitrary JSON value. If the target type has
            schema validation enabled the data must match the schema.
            Required for an upsert (the default); ignored when `delete` is
            true.
        delete:
          type: boolean
          default: false
          description: |
            Issue a delete (tombstone) for `(typeId, key)` instead of an
            upsert. A delete carries no payload: `data` is ignored and
            schema validation is skipped. Downstream syncables translate the
            delete into a removal of the record keyed by `key` (SQL: a
            `DELETE` by the configured key column; HTTP webhook: an `op:
            "delete"` payload). A delete for a record that does not exist is
            a harmless no-op. This is the intake half of right-to-be-
            forgotten erasure — pair it with `POST /v1/scrub` to also remove
            the entries from the permanent event log.

    ErrorResponse:
      type: object
      required: [code, message]
      description: Uniform shape for all non-2xx responses.
      properties:
        code:
          type: string
          description: Stable machine-readable error code.
          examples: ["unauthorized", "invalid_config", "not_found", "internal_error"]
        message:
          type: string
          description: Human-readable, safe-to-display message.
        details:
          description: Optional structured details (e.g. per-field validation errors).
