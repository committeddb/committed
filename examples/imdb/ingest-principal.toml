[ingestable]
name = "principal-ingest"
type = "sql"

[sql]
dialect = "postgres"
topic = "principal"
connectionString = "postgres://test:test@db:5432/imdb?sslmode=disable"
# Composite primary key: a movie has many principals, keyed by (tconst, ordering).
primaryKey = ["tconst", "ordering"]
tables = ["ingress.principal"]

[sql.postgres]
slot_name = "committed_principal_slot"
publication = "committed_principal_pub"

[[sql.mappings]]
jsonName = "tconst"
column = "tconst"
[[sql.mappings]]
jsonName = "ordering"
column = "ordering"
[[sql.mappings]]
jsonName = "nconst"
column = "nconst"
[[sql.mappings]]
jsonName = "category"
column = "category"
