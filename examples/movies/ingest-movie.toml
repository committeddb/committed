[ingestable]
name = "movie-ingest"
type = "sql"

[sql]
dialect = "postgres"
topic = "movie"
connectionString = "postgres://test:${CATALOG_DB_PASSWORD}@db:5432/catalog?sslmode=disable"
primaryKey = "movie_id"
tables = ["ingress.movie"]
# Mirror every column 1:1 (jsonName = column) — no per-column mappings needed.
mapAllColumns = true

[sql.postgres]
slot_name = "committed_movie_slot"
publication = "committed_movie_pub"
