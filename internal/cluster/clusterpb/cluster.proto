syntax = "proto3";
package clusterpb;

option go_package = "github.com/committeddb/committed/internal/cluster/clusterpb";

// TypeRef identifies a Type by the compound (ID, Version) key. It is
// the pointer a LogEntity carries so future readers can resolve the
// entity's Type at the exact version that was current at propose time.
// A Version of 0 means "unset" — the resolver treats that as "resolve
// as latest," which matches the pre-versioning behavior for log entries
// written before TypeRef existed.
message TypeRef {
    string ID = 1;
    uint32 Version = 2;
}

message LogEntity {
    TypeRef type = 1;
	bytes Key = 2;
	bytes Data = 3;
	// Field 4 was Timestamp (server-stamped wall-clock at propose time). A
	// clock value in a consensus log is an anti-pattern — the raft index is
	// the ordering authority and the timestamp was just one node's possibly-
	// skewed clock — so it was removed. Reserved so the number is never
	// reused with an incompatible meaning against any on-disk data.
	reserved 4;
	reserved "Timestamp";
}

message LogProposal {
    repeated LogEntity logEntities = 1;
    // requestID lets db.Propose's caller wait for *its* proposal to be
    // applied. db.DB holds a request-ID-keyed waiter map; the apply path
    // signals the waiter after the entry's bucket writes succeed. A
    // requestID of 0 means "no waiter" — used by system-internal proposers
    // (ingest worker, sync worker) that don't need read-after-write
    // semantics. Backward-compatible: old log entries unmarshal as 0.
    uint64 requestID = 2;
    // ingestableID + sourceSeq tag a proposal emitted by an ingest worker
    // for a given source event. sourceSeq is a per-ingestable monotonic
    // position (Postgres LSN, MySQL binlog file+offset) the dialect stamps
    // on every emitted proposal. The apply path advances a per-ingestable
    // highwater to max(highwater, sourceSeq), and the leader's worker
    // skips re-emitted proposals (sourceSeq <= highwater) BEFORE they
    // enter raft — giving effectively-once ingest. Empty ID / zero seq
    // means "not an ingest proposal" and is never deduped. Backward
    // compatible: pre-feature entries unmarshal as "" / 0.
    string ingestableID = 3;
    uint64 sourceSeq = 4;
}

enum LogValidationStrategy {
    NoValidation = 0;
    ValidateSchema = 1;
}

// LogEntityKind declares what the entities written under a type are —
// how much interpretation a consumer needs to apply one.
// EntityKindUnspecified is the grandfathered default: every type
// written before the field existed unmarshals as it, and it behaves
// exactly like an untyped topic (no enforcement ever applies). The
// entity kind is immutable once declared (ProposeType rejects changes
// across version bumps), so the value at any version is the value
// forever.
enum LogEntityKind {
    EntityKindUnspecified = 0;
    // Full objects; apply = overwrite (LWW per key).
    EntityKindSnapshot = 1;
    // State-relative patches; hostile to at-least-once sync delivery,
    // rejected at type creation. Reserved so the taxonomy is complete.
    EntityKindDelta = 2;
    // Domain facts; apply = fold via domain rules.
    EntityKindEvent = 3;
    // Requests; replay is dangerous, lifecycle belongs to the consumer.
    EntityKindCommand = 4;
    // Facts with no aggregate to converge on (audit, telemetry); apply =
    // append, never folded.
    EntityKindStandalone = 5;
    // Full states in a retained, ordered series — like Snapshot, but every
    // prior version is kept and individually addressable (roll back / read
    // "as of"). The latest is current; the history is part of the data, so
    // it is never compacted away.
    EntityKindRevision = 6;
}

message LogType {
    string ID = 1;
    string Name = 2;
    int32 Version = 3;
    string SchemaType = 4;
    bytes Schema = 5;
    LogValidationStrategy Validate = 6;
    // Migration is the transform program that upgrades data written
    // against version-1 of this type into the shape this version
    // expects. Interpreted as a jq program against the entity's JSON
    // payload. Empty when this is the first version (Version 1) or when
    // the schema bump is additive enough that no transform is needed.
    // Applied only when a syncable is configured in "always-current"
    // mode; "as-stored" syncables see the raw entity data and handle
    // versioning themselves.
    bytes Migration = 7;
    // EntityKind classifies what the entities written under this type
    // are (see LogEntityKind). Additive: log entries embed only
    // TypeRef, so this touches type metadata only — pre-existing types
    // unmarshal as EntityKindUnspecified and behave exactly as before.
    LogEntityKind EntityKind = 8;
    // Discriminator is a jsonpath (e.g. "$.event_type") naming the
    // field that distinguishes entity variants. Only meaningful for
    // EntityKindEvent; recorded so projection-style syncables can
    // default their match rules to it.
    string Discriminator = 9;
}

message LogConfiguration {
    string ID = 1;
    string Name = 2;
    string MimeType = 3;
    bytes Data = 4;
}

message LogSyncableIndex {
    string ID = 1;
    uint64 Index = 2;
}

message LogIngestablePosition {
    string ID = 1;
    bytes Position = 2;
}

message LogSyncableDeadLetter {
    // ID is the syncable that gave up on and skipped a proposal.
    string ID = 1;
    // index is the raft index of the failed proposal in the permanent
    // event log — the pointer back to the dropped data (the proposal
    // itself stays in the log; we only record that it was skipped).
    uint64 index = 2;
    // timestampUnixNano is the wall-clock time the leader recorded the
    // failure. Stamped once at propose time so apply is content-
    // deterministic on every replica (every node stores the same bytes).
    int64 timestampUnixNano = 3;
    // kind classifies the skip: "permanent" (Sync returned a non-retryable
    // error) or "manual" (an operator skipped a syncable wedged on a
    // transient error via DeadLetterStuckSyncable).
    string kind = 4;
    // message is the (truncated) error string from the failing Sync.
    string message = 5;
}

// LogSyncableStuck is published by a syncable's worker when it has been
// blocked retrying a transient error for longer than a debounce window. It
// is replicated like every other metadata entry so any node can report
// "syncable X is blocked on index N" (GET /syncable/{id}/status) and so an
// operator's dead-letter request can be served from any node. It is
// upsert/delete keyed by syncable id (one current value per syncable);
// deleted when the worker makes progress.
message LogSyncableStuck {
    // ID is the blocked syncable.
    string ID = 1;
    // index is the raft index of the proposal (or, for a batch syncable, the
    // head of the batch) the worker is currently blocked on.
    uint64 index = 2;
    // sinceUnixNano is when the worker first wedged on this proposal.
    int64 sinceUnixNano = 3;
    // message is the (truncated) last transient error.
    string message = 4;
}

// LogSyncableSkipRequest is proposed by the dead-letter endpoint (from any
// node) to ask the syncable's worker to skip what it is currently blocked
// on. It carries the index from the matching LogSyncableStuck so the worker
// can only ever skip the exact proposal the operator saw — never a different
// one the worker may have moved on to. Upsert/delete keyed by syncable id;
// the worker deletes it once honored (or drops it as stale).
message LogSyncableSkipRequest {
    // ID is the syncable to unstick.
    string ID = 1;
    // index is the blocked index the operator requested be skipped; the
    // worker honors the request only while its current stuck index matches.
    uint64 index = 2;
}

// LogTypeMigrationDeadLetter records that a type-migration program (jq)
// failed at runtime on the proposal at index. It is the type-keyed twin of
// LogSyncableDeadLetter: the syncable record says "syncable S skipped index
// I", this one says "type T's vN migration is what broke it" — so an
// operator can enumerate which proposals failed migration for a type and
// retry them after fixing the program. Proposed by the sync worker alongside
// the syncable dead letter; applied deterministically on every node.
message LogTypeMigrationDeadLetter {
    // typeID is the type whose migration program failed.
    string typeID = 1;
    // index is the raft index of the proposal whose entity failed to
    // migrate (the data itself stays in the permanent event log).
    uint64 index = 2;
    // timestampUnixNano is stamped once at propose time so apply is
    // content-deterministic on every replica.
    int64 timestampUnixNano = 3;
    // fromVersion -> toVersion identify the failing chain step: the
    // toVersion migration program is the one that errored.
    int32 fromVersion = 4;
    int32 toVersion = 5;
    // message is the (truncated) error string from the failing program.
    string message = 6;
}

// LogScrub is the payload of a Scrub command — the committed instruction
// that triggers physical removal of already-delete-proposed entities from
// the permanent event log. It carries one value, the upper-bound raft
// index B (the "freeze line"): only event-log entries at raft index <= B
// are eligible for removal, and only entities whose (type,key) was
// delete-proposed at a raft index <= B. Pinning B inside the committed
// command makes every replica remove the identical set, so the rewritten
// event logs stay byte-identical across nodes (the rsync-rebuild and
// determinism-test contract). See docs/event-log-architecture.md
// § "Right-to-be-forgotten / deletes".
message LogScrub {
    uint64 upperBound = 1;
}

// LogNodeAPIURL is a node's self-announcement of its advertised HTTP API
// base URL (COMMITTED_API_URL), replicated so every node can discover the
// address to reach any other — in particular the leader, for proxying
// leader-only reads (GET /v1/membership) from a follower. Raft replicates
// only node ids and raft peer URLs, never API addresses, so each node
// announces its own once it joins. Upsert keyed by node id; the apply path
// stores it in the memberAPIURLs bucket. See raft-leader-read-proxy.md.
message LogNodeAPIURL {
    uint64 nodeID = 1;
    string apiURL = 2;
}