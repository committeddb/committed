syntax = "proto3";
package dialectpb;

option go_package = "github.com/committeddb/committed/internal/cluster/ingestable/dialect/dialectpb";

message MySQLBinLogPosition {
    string name = 1;
    uint32 pos = 2;
    // snapshot_progress is populated only while the initial snapshot is
    // still running. It tracks per-table progress so a restart can
    // resume mid-snapshot instead of re-reading already-flushed rows.
    // Cleared once the snapshot completes.
    SnapshotProgress snapshot_progress = 3;
    // gtid_set is the consumed GTID set for MySQL GTID positioning (the
    // failover-safe resume cursor). Empty means file:pos-only — a legacy
    // checkpoint written before GTID support, or a source with gtid_mode=OFF.
    string gtid_set = 4;
    // refresh_epoch is the ingest reconciling-refresh generation the worker
    // stamps on every emitted entity and carries across checkpoints. It starts
    // at 1 on the initial snapshot and bumps when a binlog purge (error 1236)
    // forces an in-place re-snapshot; after a full re-snapshot the worker emits
    // a refresh-boundary marker at this epoch so a keyed sink sweeps rows left
    // at an older one. 0 means a pre-feature checkpoint (epoch-1 baseline).
    uint64 refresh_epoch = 5;
    // chunk_tag fingerprints the inputs that determine how an oversized
    // transaction is split into same-coordinate parts (the flush byte budget,
    // the config's rendering, a binary rendering version). It is stamped on
    // every checkpoint. On resume, if the current tag differs from the one
    // recorded here, re-chunking a replayed same-coordinate multi-part
    // transaction could shift a row across a part boundary and mis-drop it under
    // SourceSeq dedup — so those replayed parts are flagged DedupUnsafe and the
    // worker freezes rather than risk silent loss. 0 means a pre-feature
    // checkpoint (no baseline → never trips). See mysql.go chunkTag.
    uint64 chunk_tag = 6;
}

// PostgresPosition pairs the replication LSN with optional snapshot
// progress. New checkpoints always use this proto-encoded format,
// prefixed with a 0xFF magic byte so the 8-byte legacy raw-LSN format
// is still readable. See postgres.go encode/decodePosition.
message PostgresPosition {
    uint64 lsn = 1;
    SnapshotProgress snapshot_progress = 2;
    // refresh_epoch is the ingest reconciling-refresh generation the worker
    // stamps on every emitted entity and carries across checkpoints. It starts
    // at 1 on the initial snapshot and bumps on each gap-recovery re-snapshot;
    // after a full re-snapshot the worker emits a refresh-boundary marker at
    // this epoch so a keyed sink sweeps rows left at an older one. 0 means a
    // pre-feature checkpoint (treated as the epoch-1 baseline on resume).
    uint64 refresh_epoch = 3;
}

// SnapshotProgress tracks where a chunked (keyset-paginated) snapshot
// has gotten to. A table is either:
//   - absent from both fields: not yet started
//   - present in last_pk_by_table: partially complete (resume WHERE pk > last_pk)
//   - present in completed_tables: done, skip entirely on resume
message SnapshotProgress {
    map<string, string> last_pk_by_table = 1;
    repeated string completed_tables = 2;
}
